<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Downloader Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
            --input-text: #333333;
            --border-color: #dee2e6;
            --btn-border: #6c757d;
            --alert-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --card-bg: #1e1e1e;
            --input-bg: #2d2d2d;
            --input-text: #ffffff;
            --border-color: #404040;
            --btn-border: #808080;
            --alert-bg: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }

        .card {
            background-color: var(--card-bg);
            border-color: var(--border-color);
        }

        .form-control {
            background-color: var(--input-bg);
            color: var(--input-text);
            border-color: var(--border-color);
        }

        .form-control:focus {
            background-color: var(--input-bg);
            color: var(--input-text);
            border-color: #666666;
            box-shadow: 0 0 0 0.2rem rgba(130, 138, 145, 0.25);
        }

        .btn-outline-secondary {
            color: var(--text-color);
            border-color: var(--btn-border);
        }

        .btn-outline-secondary:hover {
            background-color: var(--input-bg);
            color: var(--text-color);
            border-color: var(--btn-border);
        }

        .alert {
            background-color: var(--alert-bg);
            border-color: var(--border-color);
            color: var(--text-color);
        }

        .form-text {
            color: var(--text-color) !important;
            opacity: 0.9;
        }

        [data-theme="dark"] .text-muted {
            color: #b0b0b0 !important;
        }

        [data-theme="dark"] .alert {
            border-width: 2px;
        }

        [data-theme="dark"] .alert-success {
            background-color: #1e2b1e;
            border-color: #285b28;
            color: #a3d7a3;
        }

        [data-theme="dark"] .alert-danger {
            background-color: #2b1e1e;
            border-color: #5b2828;
            color: #d7a3a3;
        }

        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15);
        }
        .btn-primary {
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
        }
        .card {
            border: none;
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        .platform-icon {
            font-size: 1.5em;
            margin-right: 0.5em;
        }
        .fa-spotify {
            color: #1DB954;
        }
        .fa-youtube {
            color: #FF0000;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="text-center mb-4">
                            <span class="platform-icon">
                                <i class="fab fa-youtube"></i>
                                <i class="fab fa-spotify"></i>
                            </span>
                            Music Downloader Pro
                            <button id="themeToggle" class="btn btn-outline-secondary btn-sm ms-2" onclick="toggleTheme()">
                                <i class="fas fa-moon"></i>
                            </button>
                        </h1>
                        
                        <div id="alertContainer">
                            {% if error %}
                            <div class="alert alert-danger d-flex align-items-center" role="alert">
                                <i class="fas fa-exclamation-circle me-2"></i>
                                {{ error }}
                            </div>
                            {% endif %}

                            {% if success %}
                            <div class="alert alert-success d-flex align-items-center" role="alert">
                                <i class="fas fa-check-circle me-2"></i>
                                <div>
                                    Successfully converted: <strong>{{ video_title }}</strong>
                                    <br>
                                    <a href="{{ url_for('download', filename=filename) }}" class="alert-link">
                                        <i class="fas fa-download me-1"></i> Download MP3
                                    </a>
                                </div>
                            </div>
                            {% endif %}
                        </div>

                        <form id="convertForm" method="POST" class="mb-4">
                            <div class="mb-3">
                                <label for="url" class="form-label">
                                    <i class="fas fa-link me-1"></i>
                                    Enter URL
                                </label>
                                <div class="input-group">
                                    <input type="url" class="form-control" id="url" name="url" 
                                           pattern="^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/|open\.spotify\.com\/.*track\/).+" 
                                           placeholder="YouTube or Spotify track URL..." required>
                                    <button type="submit" class="btn btn-primary" id="submitBtn">
                                        <i class="fas fa-download me-1"></i>
                                        Download
                                    </button>
                                </div>
                                <div class="form-text text-muted">
                                    <i class="fas fa-info-circle me-1"></i>
                                    Paste a YouTube video or Spotify track URL
                                </div>
                            </div>
                        </form>

                        <div id="progressContainer" class="d-none">
                            <div class="progress mb-3" style="height: 20px;">
                                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" 
                                     role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
                                </div>
                            </div>
                            <p id="statusText" class="text-center text-muted">
                                <i class="fas fa-spinner fa-spin me-1"></i>
                                <span>Starting download...</span>
                            </p>
                        </div>

                        <div class="text-center text-muted mt-4">
                            <small>
                                <i class="fas fa-shield-alt me-1"></i>
                                This tool uses yt-dlp and the official Spotify API
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Theme handling
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            
            const icon = document.querySelector('#themeToggle i');
            icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            setTheme(newTheme);
        }

        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);

        document.getElementById('convertForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = this;
            const submitBtn = document.getElementById('submitBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            const alertContainer = document.getElementById('alertContainer');
            
            // Validate URL
            const urlInput = document.getElementById('url');
            const urlPattern = /^(https?:\/\/)?(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/|open\.spotify\.com\/.*track\/).+/;
            if (!urlPattern.test(urlInput.value)) {
                showAlert('Please enter a valid YouTube or Spotify URL', 'danger');
                return;
            }

            // Reset UI
            submitBtn.disabled = true;
            progressContainer.classList.remove('d-none');
            progressBar.style.width = '0%';
            progressBar.classList.remove('bg-danger');
            progressBar.classList.add('progress-bar-animated');
            alertContainer.innerHTML = '';
            
            // Update status messages
            const stages = [
                { progress: 20, message: 'Fetching track information...' },
                { progress: 40, message: 'Preparing download...' },
                { progress: 60, message: 'Downloading audio...' },
                { progress: 80, message: 'Converting to MP3...' },
                { progress: 95, message: 'Finalizing...' }
            ];
            
            let currentStage = 0;
            const interval = setInterval(() => {
                if (currentStage < stages.length) {
                    updateProgress(
                        stages[currentStage].progress,
                        stages[currentStage].message
                    );
                    currentStage++;
                }
            }, 1500);

            // Submit form
            fetch(form.action, {
                method: 'POST',
                body: new FormData(form)
            })
            .then(response => response.text())
            .then(html => {
                clearInterval(interval);
                updateProgress(100, 'Completed!');
                
                // Parse the response HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Check for success or error messages
                const successAlert = doc.querySelector('.alert-success');
                const errorAlert = doc.querySelector('.alert-danger');
                
                if (successAlert) {
                    showAlert(successAlert.innerHTML, 'success');
                } else if (errorAlert) {
                    showAlert(errorAlert.textContent, 'danger');
                }
                
                submitBtn.disabled = false;
                setTimeout(() => {
                    progressContainer.classList.add('d-none');
                }, 1000);
            })
            .catch(error => {
                clearInterval(interval);
                showAlert('An error occurred while processing your request. Please try again.', 'danger');
                progressBar.classList.remove('progress-bar-animated');
                progressBar.classList.add('bg-danger');
                submitBtn.disabled = false;
            });
        });

        function updateProgress(progress, message) {
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            
            progressBar.style.width = progress + '%';
            progressBar.setAttribute('aria-valuenow', progress);
            
            if (message) {
                statusText.innerHTML = `
                    <i class="fas fa-spinner fa-spin me-1"></i>
                    <span>${message}</span>
                `;
            }
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const icon = type === 'success' ? 'check-circle' : 'exclamation-circle';
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type} d-flex align-items-center" role="alert">
                    <i class="fas fa-${icon} me-2"></i>
                    ${message}
                </div>
            `;
        }
    </script>
</body>
</html>
